<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Premium Barcode Generator</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&family=Outfit:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --glass-border: rgba(255, 255, 255, 0.1);
        --sidebar-bg: #0f172a;
        --border: #334155;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent: #38bdf8;
        --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* Sidebar Styles (matching index.html) */
      aside {
        width: 280px;
        background-color: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        flex-shrink: 0;
        transition: width 0.3s ease, padding 0.3s ease;
        position: relative;
        z-index: 100;
        text-align: left;
      }

      aside.collapsed {
        width: 80px;
        padding: 1.5rem 0.75rem;
      }

      .sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 3rem;
      }

      aside.collapsed .sidebar-header {
        justify-content: center;
        margin-bottom: 1.5rem;
      }

      .logo {
        font-family: 'Outfit', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        white-space: nowrap;
        transition: opacity 0.3s ease;
      }

      aside.collapsed .logo {
        display: none;
      }

      .sidebar-toggle {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
      }

      .sidebar-toggle:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-primary);
        border-color: var(--accent);
      }

      aside.collapsed .sidebar-toggle {
        position: static;
      }

      nav {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .nav-item {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 500;
        color: var(--text-secondary);
        text-decoration: none;
      }

      .nav-item:hover {
        background-color: rgba(255, 255, 255, 0.05);
        color: var(--text-primary);
      }

      .nav-item.active {
        background-color: rgba(56, 189, 248, 0.1);
        color: var(--accent);
        box-shadow: inset 0 0 0 1px var(--accent);
      }

      aside.collapsed .nav-item {
        justify-content: center;
        padding: 0.75rem;
      }

      aside.collapsed .nav-item span {
        display: none;
      }

      /* Main Layout */
      .page-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 2rem;
        align-items: center;
        justify-content: center;
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(99, 102, 241, 0.15) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 0%,
            rgba(168, 85, 247, 0.15) 0px,
            transparent 50%
          );
      }

      .container {
        max-width: 600px;
        width: 100%;
        z-index: 1;
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
        animation: fadeInDown 0.8s ease-out;
      }

      h1 {
        font-size: 3rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p.subtitle {
        color: var(--text-muted);
        font-size: 1.1rem;
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        animation: fadeInUp 0.8s ease-out 0.2s both;
      }

      .input-group {
        margin-bottom: 2rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      input,
      select {
        width: 100%;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        color: var(--text);
        font-size: 1rem;
        transition: all 0.3s ease;
        outline: none;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
      }

      .preview-area {
        background: white;
        border-radius: 16px;
        padding: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 200px;
        margin-bottom: 2rem;
        position: relative;
        overflow: hidden;
        transition: transform 0.3s ease;
      }

      .preview-area:hover {
        transform: scale(1.02);
      }

      #barcode {
        max-width: 100%;
        height: auto;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      button {
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 1rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      button:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      button svg {
        width: 20px;
        height: 20px;
      }

      footer {
        margin-top: auto;
        padding: 2rem;
        color: var(--text-muted);
        font-size: 0.875rem;
        text-align: center;
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }
    </style>

    <div class="page-content">
      <div class="container">
      <header>
        <h1>Barcode Generator</h1>
        <p class="subtitle">Generate high-quality barcodes for GitHub Pages</p>
      </header>

      <main class="card">
        <div class="input-group">
          <label for="barcodeValue">Barcode Value</label>
          <input
            type="text"
            id="barcodeValue"
            placeholder="Enter text or numbers..."
            autocomplete="off"
            value="123456789"
          />
          <p id="formatHint" style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;"></p>
        </div>

        <div class="input-group">
          <label for="barcodeType">Format</label>
          <select id="barcodeType">
            <option value="CODE128">CODE128 (Standard)</option>
            <option value="EAN13">EAN13</option>
            <option value="UPC">UPC</option>
            <option value="CODE39">CODE39</option>
            <option value="ITF14">ITF14</option>
            <option value="MSI">MSI</option>
            <option value="pharmacode">Pharmacode</option>
          </select>
        </div>

        <div class="input-group" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox" id="transparentBg" checked style="width: auto; cursor: pointer;" />
          <label for="transparentBg" style="margin-bottom: 0; cursor: pointer; text-transform: none; letter-spacing: normal;">Transparent Background</label>
        </div>

        <div class="input-group" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox" id="displayText" checked style="width: auto; cursor: pointer;" />
          <label for="displayText" style="margin-bottom: 0; cursor: pointer; text-transform: none; letter-spacing: normal;">Show Text under Barcode</label>
        </div>

        <div class="preview-area" id="previewArea">
          <svg id="barcode"></svg>
          <div id="errorMessage" style="display: none; color: #ef4444; font-weight: 600; text-align: center; padding: 1rem;">Invalid input for selected format</div>
        </div>

        <div class="actions">
          <button id="downloadBtn">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
              ></path>
            </svg>
            Download PNG (Transparent)
          </button>

    <footer>
      <p>&copy; 2026 Barcode Generator &bull; Powered by JsBarcode</p>
    </footer>

    <canvas id="hiddenCanvas" style="display: none"></canvas>

    <script>
      const input = document.getElementById("barcodeValue");
      const typeSelect = document.getElementById("barcodeType");
      const transparentBg = document.getElementById("transparentBg");
      const displayText = document.getElementById("displayText");
      const downloadBtn = document.getElementById("downloadBtn");
      const hiddenCanvas = document.getElementById("hiddenCanvas");

      const formatHints = {
        CODE128: "Any ASCII character",
        EAN13: "12 digits (plus 1 checksum digit)",
        UPC: "11 digits (plus 1 checksum digit)",
        CODE39: "Uppercase letters, numbers, and - . $ / + % [space]",
        ITF14: "14 digits (only numbers)",
        MSI: "Only numbers",
        pharmacode: "Only numbers (3 to 131070)"
      };

      function updateHint() {
        const format = typeSelect.value;
        const hint = document.getElementById("formatHint");
        hint.textContent = formatHints[format] || "";
      }

      function generate() {
        const value = input.value || "";
        const format = typeSelect.value;
        const isTransparent = transparentBg.checked;
        const showText = displayText.checked;
        const errorEl = document.getElementById("errorMessage");
        const svgEl = document.getElementById("barcode");

        if (!value) {
          svgEl.style.display = "none";
          errorEl.style.display = "none";
          return;
        }

        try {
          JsBarcode("#barcode", value, {
            format: format,
            lineColor: "#000",
            width: 2,
            height: 100,
            displayValue: showText,
            fontSize: 16,
            font: "JetBrains Mono",
            background: isTransparent ? "transparent" : "#ffffff",
          });
          svgEl.style.display = "block";
          errorEl.style.display = "none";
          svgEl.style.opacity = "1";
        } catch (e) {
          console.error("Barcode generation failed", e);
          svgEl.style.display = "none";
          errorEl.style.display = "block";
        }
      }

      input.addEventListener("input", generate);
      typeSelect.addEventListener("change", () => {
        updateHint();
        generate();
      });
      transparentBg.addEventListener("change", generate);
      displayText.addEventListener("change", generate);

      downloadBtn.addEventListener("click", () => {
        const svg = document.getElementById("barcode");
        const svgData = new XMLSerializer().serializeToString(svg);
        const canvas = hiddenCanvas;
        const ctx = canvas.getContext("2d");
        const img = new Image();

        // Get SVG dimensions
        const svgSize = svg.getBoundingClientRect();
        canvas.width = svgSize.width * 2; // Higher resolution
        canvas.height = svgSize.height * 2;

        const svgBlob = new Blob([svgData], {
          type: "image/svg+xml;charset=utf-8",
        });
        const url = URL.createObjectURL(svgBlob);

        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          const pngUrl = canvas.toDataURL("image/png");
          const downloadLink = document.createElement("a");
          
          // Sanitize filename and ensure .png extension
          let filename = input.value.replace(/[^a-z0-9]/gi, '_').toLowerCase() || "barcode";
          if (!filename.endsWith(".png")) filename += ".png";
          
          downloadLink.href = pngUrl;
          downloadLink.download = filename;
          document.body.appendChild(downloadLink);
          downloadLink.click();
          document.body.removeChild(downloadLink);
          URL.revokeObjectURL(url);
        };

        img.src = url;
      });

      // Sidebar Toggle Logic
      const sidebar = document.getElementById('sidebar');
      const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
  
      // Load initial state
      const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
      if (isCollapsed) {
        sidebar.classList.add('collapsed');
      }
  
      sidebarToggleBtn.onclick = (e) => {
        e.stopPropagation();
        sidebar.classList.toggle('collapsed');
        localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
      };

      // Initial generation
      window.addEventListener("load", () => {
        updateHint();
        generate();
      });
    </script>
