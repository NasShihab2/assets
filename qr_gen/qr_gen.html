    <style>
      :root {
        --primary: #8b5cf6;
        --primary-hover: #7c3aed;
        --bg: #020617;
        --card-bg: rgba(15, 23, 42, 0.7);
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --glass-border: rgba(255, 255, 255, 0.1);
        --accent: #38bdf8;
        --sidebar-bg: #0f172a;
        --border: #334155;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* Sidebar Styles (matching index.html) */
      aside {
        width: 280px;
        background-color: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        flex-shrink: 0;
        transition: width 0.3s ease, padding 0.3s ease;
        position: relative;
        z-index: 100;
        text-align: left;
      }

      aside.collapsed {
        width: 80px;
        padding: 1.5rem 0.75rem;
      }

      .sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 3rem;
      }

      aside.collapsed .sidebar-header {
        justify-content: center;
        margin-bottom: 1.5rem;
      }

      .logo {
        font-family: 'Outfit', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        white-space: nowrap;
        transition: opacity 0.3s ease;
      }

      aside.collapsed .logo {
        display: none;
      }

      .sidebar-toggle {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
      }

      .sidebar-toggle:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-primary);
        border-color: var(--accent);
      }

      aside.collapsed .sidebar-toggle {
        position: static;
      }

      nav {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .nav-item {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 500;
        color: var(--text-secondary);
        text-decoration: none;
      }

      .nav-item:hover {
        background-color: rgba(255, 255, 255, 0.05);
        color: var(--text-primary);
      }

      .nav-item.active {
        background-color: rgba(56, 189, 248, 0.1);
        color: var(--accent);
        box-shadow: inset 0 0 0 1px var(--accent);
      }

      aside.collapsed .nav-item {
        justify-content: center;
        padding: 0.75rem;
      }

      aside.collapsed .nav-item span {
        display: none;
      }

      /* Main Layout */
      .page-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 4rem 2rem;
        align-items: center;
        background-image:
          radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.15) 0px, transparent 50%);
      }

      .container {
        max-width: 1000px;
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 400px;
        gap: 3rem;
        z-index: 1;
      }

      header {
        grid-column: 1 / -1;
        text-align: center;
        margin-bottom: 3rem;
      }

      h1 {
        font-family: 'Outfit', sans-serif;
        font-size: 3.5rem;
        font-weight: 800;
        letter-spacing: -0.05em;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, #a78bfa, #38bdf8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 32px;
        padding: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .input-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-muted);
        margin-bottom: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      input, select, textarea {
        width: 100%;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        color: var(--text);
        font-size: 0.95rem;
        transition: all 0.3s ease;
        outline: none;
      }

      input:focus, select:focus, textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
      }

      .qr-preview-container {
        position: sticky;
        top: 4rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      .qr-area {
        background: white;
        border-radius: 24px;
        padding: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1;
        width: 100%;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
      }

      #qrcode canvas {
        max-width: 100%;
        height: auto !important;
      }

      #logoOverlay {
        display: none !important;
      }

      .actions {
        width: 100%;
      }

      button {
        width: 100%;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 16px;
        padding: 1.25rem;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
      }

      button:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.5);
      }

      button:active {
        transform: translateY(0);
      }

      .toggle-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        cursor: pointer;
        background: rgba(255,255,255,0.05);
        padding: 0.75rem 1rem;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
      }

      .checkbox-item input {
        width: auto;
      }

      .checkbox-item label {
        margin-bottom: 0;
        text-transform: none;
        letter-spacing: normal;
        font-size: 0.85rem;
        cursor: pointer;
      }

      .hidden {
        display: none;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 99px;
        outline: none;
        border: none;
        padding: 0;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--primary);
        cursor: pointer;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
      }

      .range-row {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .range-value {
        min-width: 2rem;
        text-align: center;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text);
        background: rgba(255,255,255,0.07);
        border-radius: 8px;
        padding: 0.25rem 0.5rem;
      }

      @media (max-width: 900px) {
        .container {
          grid-template-columns: 1fr;
        }
        .qr-preview-container {
          position: static;
        }
      }
    </style>

      function getVCardData() {

END:VCARD`;
      }

      function getContent() {
        const type = qrType.value;
        if (type === 'url') return document.getElementById('urlIn').value;
        if (type === 'vcard') return getVCardData();

      // Crop canvas to tight content bounds (for margin=0 truly marginless)
      function cropCanvasTight(src) {
        const w = src.width, h = src.height;
        const ctx = src.getContext('2d');
        const data = ctx.getImageData(0, 0, w, h).data;

        // Determine the "empty" color from the top-left pixel
        const bgR = data[0], bgG = data[1], bgB = data[2];
        const tol = 10; // tolerance for near-bg pixels

        function isEmpty(x, y) {
          const i = (y * w + x) * 4;
          const a = data[i + 3];
          if (a < 10) return true; // transparent
          return Math.abs(data[i] - bgR) < tol &&
                 Math.abs(data[i+1] - bgG) < tol &&
                 Math.abs(data[i+2] - bgB) < tol;
        }

        let top = 0, bottom = h - 1, left = 0, right = w - 1;

        outer: for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) if (!isEmpty(x, y)) { top = y; break outer; }
        }
        outer: for (let y = h - 1; y >= top; y--) {
          for (let x = 0; x < w; x++) if (!isEmpty(x, y)) { bottom = y; break outer; }
        }
        outer: for (let x = 0; x < w; x++) {
          for (let y = top; y <= bottom; y++) if (!isEmpty(x, y)) { left = x; break outer; }
        }
        outer: for (let x = w - 1; x >= left; x--) {
          for (let y = top; y <= bottom; y++) if (!isEmpty(x, y)) { right = x; break outer; }
        }

        const cw = right - left + 1, ch = bottom - top + 1;
        const out = document.createElement('canvas');
        out.width = cw; out.height = ch;
        out.getContext('2d').drawImage(src, left, top, cw, ch, 0, 0, cw, ch);
        return out;
      }

          await QRLib.toCanvas(exportCanvas, content, {
            width: 1000,
            margin: margin,
            color: {
              dark: color,
              light: isTransparent ? "#00000000" : "#ffffff"
            },
            // Force high error correction if we have a logo
            errorCorrectionLevel: hasLogo ? 'H' : 'M'
          });

          const ctx = exportCanvas.getContext('2d');

          // 2. Draw Logo on Export Canvas if exists
          if (hasLogo) {
            await drawLogoToCanvas(exportCanvas, logoDataUrl);
          }

          // 3. If margin is 0, crop to true content bounds (no quiet zone at all)
          let finalCanvas = exportCanvas;
          if (margin === 0) {
            finalCanvas = cropCanvasTight(exportCanvas);
            // Copy cropped result back into exportCanvas for download
            exportCanvas.width = finalCanvas.width;
            exportCanvas.height = finalCanvas.height;
            exportCanvas.getContext('2d').drawImage(finalCanvas, 0, 0);
          }

          // 4. Display in UI (smaller preview)
          const previewCanvas = document.createElement('canvas');
          previewCanvas.width = 600;
          previewCanvas.height = 600;
          const pCtx = previewCanvas.getContext('2d');
          pCtx.drawImage(finalCanvas, 0, 0, 600, 600);
          
          qrDiv.innerHTML = '';
          qrDiv.appendChild(previewCanvas);

        } catch (err) {
          console.error("QR Generation Error:", err);
        }
      }

      function drawLogoToCanvas(canvas, logoSrc) {
        return new Promise((resolve) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => {
            const ctx = canvas.getContext('2d');

            // Max container size: 18% of canvas width
            const maxSize = canvas.width * 0.18;

            // Preserve aspect ratio (object-fit: contain)
            const ratio = img.naturalWidth / img.naturalHeight;
            let drawW, drawH;
            if (ratio >= 1) {
              drawW = maxSize;
              drawH = maxSize / ratio;
            } else {
              drawH = maxSize;
              drawW = maxSize * ratio;
            }

            const x = (canvas.width - drawW) / 2;
            const y = (canvas.height - drawH) / 2;

            // White quiet-zone background
            const padding = 12;
            ctx.fillStyle = "#FFFFFF";
            ctx.shadowBlur = 0;
            ctx.fillRect(x - padding, y - padding, drawW + padding * 2, drawH + padding * 2);

            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.lineWidth = 1;
            ctx.strokeRect(x - padding, y - padding, drawW + padding * 2, drawH + padding * 2);

            ctx.drawImage(img, x, y, drawW, drawH);
            resolve();
          };
          img.onerror = () => {
            console.error("Failed to load logo image");
            resolve();
          };
          img.src = logoSrc;
        });
      }

      // Type Switcher
      qrType.addEventListener('change', () => {
        document.querySelectorAll('.field-group').forEach(g => g.classList.add('hidden'));
        document.getElementById(qrType.value + 'Fields').classList.remove('hidden');
        generate();
      });

      // Logo Handling — store logo data in a variable, never show the img element
      let logoDataUrl = null;
      logoIn.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (re) => {
            logoDataUrl = re.target.result;
            logoOverlay.src = logoDataUrl; // keep src for hasLogo check
            generate();
          };
          reader.readAsDataURL(file);
        } else {
          logoDataUrl = null;
          logoOverlay.src = '';
          generate();
        }
      });

      // Margin slider live update
      qrMarginInput.addEventListener('input', () => {
        qrMarginVal.textContent = qrMarginInput.value;
        generate();
      });

      // Inputs
      document.querySelectorAll('input, select, textarea').forEach(el => {
        el.addEventListener('input', generate);
      });
      transparentBg.addEventListener('change', generate);

      // Download
      downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `qr_${Date.now()}.png`;
        link.href = exportCanvas.toDataURL();
        link.click();
      });

      // Sidebar Toggle Logic
      const sidebar = document.getElementById('sidebar');
      const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
  
      // Load initial state
      const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
      if (isCollapsed) {
        sidebar.classList.add('collapsed');
      }
  
      sidebarToggleBtn.onclick = (e) => {
        e.stopPropagation();
        sidebar.classList.toggle('collapsed');
        localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
      };

      // Initial
      window.addEventListener('load', () => {
        // Delay slightly to ensure library is available
        setTimeout(generate, 100);
      });
    </script>
  </body>
</html>
